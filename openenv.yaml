name: email-triage-openenv
version: "1.0.0"
description: Real-world email triage environment — classify urgency, extract action items, draft replies.
author: Pratham Shettigar
tags: [email, triage, nlp, real-world]

tasks:
  - id: task_easy
    name: Email Urgency Classification
    difficulty: easy
    description: Classify the email as urgent, normal, or low priority.
    reward_range: [0.0, 1.0]
  - id: task_medium
    name: Action Item Extraction
    difficulty: medium
    description: Extract all required action items from the email.
    reward_range: [0.0, 1.0]
  - id: task_hard
    name: Professional Reply Drafting
    difficulty: hard
    description: Draft a complete professional reply to the email.
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  properties:
    task_id: {type: string}
    task_type: {type: string}
    email_subject: {type: string}
    email_body: {type: string}
    step: {type: integer}
    done: {type: boolean}

action_space:
  type: object
  properties:
    text: {type: string}

endpoints:
  reset: {method: POST, path: /reset}
  step:  {method: POST, path: /step}
  state: {method: GET,  path: /state}